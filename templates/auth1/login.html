{% extends "base.html" %}
{% block title %}Sign In — Boilerworks{% endblock %}

{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
  <div class="w-full max-w-sm space-y-8">
    <div>
      <h2 class="text-center text-3xl font-bold tracking-tight text-gray-900">Sign in</h2>
      <p class="mt-2 text-center text-sm text-gray-600">Boilerworks Django + HTMX</p>
    </div>

    {% if form.errors %}
    <div class="rounded-md bg-red-50 p-4">
      <p class="text-sm text-red-800">Invalid username or password.</p>
    </div>
    {% endif %}

    <form method="post" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
        <div class="mt-1">{{ form.username }}</div>
      </div>
      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
        <div class="mt-1">{{ form.password }}</div>
      </div>
      <button type="submit"
              class="w-full rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
