<div id="product-table">
  <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium uppercase text-gray-500">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium uppercase text-gray-500">SKU</th>
          <th class="px-6 py-3 text-left text-xs font-medium uppercase text-gray-500">Price</th>
          <th class="px-6 py-3 text-left text-xs font-medium uppercase text-gray-500">Status</th>
          <th class="px-6 py-3 text-right text-xs font-medium uppercase text-gray-500">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 bg-white">
        {% for product in products %}
        <tr class="hover:bg-gray-50">
          <td class="px-6 py-4 whitespace-nowrap">
            <a href="{% url 'products:detail' slug=product.slug %}" class="text-indigo-600 hover:text-indigo-900 font-medium">
              {{ product.name }}
            </a>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ product.sku|default:"—" }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${{ product.price }}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            {% if product.is_active %}
            <span class="inline-flex rounded-full bg-green-100 px-2 text-xs font-semibold leading-5 text-green-800">Active</span>
            {% else %}
            <span class="inline-flex rounded-full bg-gray-100 px-2 text-xs font-semibold leading-5 text-gray-800">Inactive</span>
            {% endif %}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
            {% if perms.products.change_product %}
            <a href="{% url 'products:update' slug=product.slug %}" class="text-indigo-600 hover:text-indigo-900">Edit</a>
            {% endif %}
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5" class="px-6 py-8 text-center text-sm text-gray-500">No products found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
